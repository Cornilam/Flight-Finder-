        function addLog(message, type) {
            var log = document.getElementById("statusLog");
            var now = new Date();
            var ts = now.toLocaleTimeString("en-US", { hour12: false });
            var entry = document.createElement("div");
            entry.className = "entry";
            entry.innerHTML =
                '<span class="timestamp">' + ts + '</span>' +
                '<span class="msg ' + (type || "") + '">' + message + '</span>';
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function setButtonsDisabled(disabled) {
            document.getElementById("searchBtn").disabled = disabled;
        }

        function getSearchParams() {
            var oEl = document.getElementById('inputOrigin');
            var dEl = document.getElementById('inputDestination');
            return {
                origin: (oEl.dataset.selectedIata || oEl.value || '').trim().toUpperCase(),
                destination: (dEl.dataset.selectedIata || dEl.value || '').trim().toUpperCase(),
                depart_date: document.getElementById('inputDepart').value,
                return_date: document.getElementById('inputReturn').value,
                hub_compare: document.getElementById('hubCompare').checked,
                hub_airport: 'ORD',
                driving_cost: 60,
                parking_rate: 20,
            };
        }

        var pendingHubSearch = null;

        function runSearch() {
            var params = getSearchParams();
            if (params.origin.length !== 3) { alert('Origin must be a 3-letter airport code'); return; }
            if (params.destination.length !== 3) { alert('Destination must be a 3-letter airport code'); return; }
            if (!params.depart_date) { alert('Please select a departure date'); return; }
            if (!params.return_date) { alert('Please select a return date'); return; }
            if (params.return_date <= params.depart_date) { alert('Return date must be after departure date'); return; }

            if (params.hub_compare && params.hub_airport.length === 3) {
                pendingHubSearch = Object.assign({}, params, { origin: params.hub_airport, is_hub_search: true });
            } else {
                pendingHubSearch = null;
            }

            startSearch(params, false);
        }

        function startSearch(params, forceRefresh) {
            var cacheKey = makeCacheKey(params.origin, params.destination, params.depart_date, params.return_date);

            if (!forceRefresh && resultsCache[cacheKey]) {
                document.getElementById("searchAnimation").classList.remove("visible");
                document.getElementById("errorBanner").classList.remove("visible");
                renderResults(resultsCache[cacheKey], true);
                return;
            }

            setButtonsDisabled(true);

            // Show animation panel
            var animPanel = document.getElementById("searchAnimation");
            animPanel.classList.add("visible");
            document.getElementById("statusLog").innerHTML = "";
            document.getElementById("statusLog").style.display = "none";
            document.getElementById("detailsArrow").innerHTML = "&#9656;";

            // Initialize animation (hubs will be updated when start event arrives)
            initAnimation(params.origin, params.destination, []);

            document.getElementById("resultsPanel").classList.remove("visible");
            document.getElementById("errorBanner").classList.remove("visible");
            document.getElementById("originLabel").innerHTML = "";
            document.getElementById("priceInsights").innerHTML = "";
            document.getElementById("directFlightsList").innerHTML = "";
            document.getElementById("baselineCard").innerHTML = "";
            document.getElementById("hackerFareTable").innerHTML = "";
            document.getElementById("warnings").innerHTML = "";

            addLog("Starting search: " + params.origin + " \u2192 " + params.destination + "...", "searching");

            fetch("/search", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(params),
            })
            .then(function(resp) { return resp.json(); })
            .then(function(data) {
                if (data.error) {
                    addLog(data.error, "error");
                    var banner = document.getElementById("errorBanner");
                    banner.textContent = data.error;
                    banner.classList.add("visible");
                    setButtonsDisabled(false);
                    return;
                }
                listenForUpdates(data.search_id, cacheKey);
            })
            .catch(function(err) {
                addLog("Failed to start search: " + err, "error");
                setButtonsDisabled(false);
            });
        }

        function listenForUpdates(searchId, cacheKey) {
            var evtSource = new EventSource("/stream/" + searchId);

            evtSource.addEventListener("status", function(e) {
                var data = JSON.parse(e.data);
                var type = "searching";
                if (data.step && data.step.endsWith("_done")) type = "success";
                if (data.step === "done") type = "done";
                addLog(data.message, type);

                // Initialize hub tracker when we get the start event with hubs list
                if (data.step === "start" && data.hubs) {
                    initAnimation(
                        document.getElementById('arcOrigin').textContent,
                        document.getElementById('arcDest').textContent,
                        data.hubs
                    );
                }

                // Drive the animation
                handleStatusEvent(data);
            });

            evtSource.addEventListener("error", function(e) {
                try {
                    var data = JSON.parse(e.data);
                    addLog(data.message, "error");
                    var banner = document.getElementById("errorBanner");
                    banner.textContent = data.message;
                    banner.classList.add("visible");
                } catch(err) {}
            });

            evtSource.addEventListener("results", function(e) {
                var results = JSON.parse(e.data);
                results._cached_at = results.searched_at || new Date().toISOString();
                results._cache_key = cacheKey;
                resultsCache[cacheKey] = results;
                saveToLocalStorage();
                renderRecentSearches();
                fetchCommunityDeals();
                renderResults(results, false);
            });

            evtSource.addEventListener("done", function(e) {
                evtSource.close();

                // Fill progress to 100%
                completedSteps = totalSteps;
                updateProgress("Search complete!");

                // Hide animation after a brief moment
                setTimeout(function() {
                    document.getElementById("searchAnimation").classList.remove("visible");
                }, 1500);

                setButtonsDisabled(false);

                if (pendingHubSearch) {
                    var hubParams = pendingHubSearch;
                    pendingHubSearch = null;
                    addLog("Starting hub comparison search from " + hubParams.origin + "...", "searching");
                    startSearch(hubParams, false);
                }
            });
        }

        function renderResults(r, fromCache) {
            document.getElementById("resultsPanel").classList.add("visible");
            lastRenderedOrigin = r._cache_key || r.search_origin;

            // Reset to Direct Flights tab
            switchTab('direct');

            // Render Direct Flights tab
            renderDirectFlights(
                r.baseline_flights || (r.baseline ? [r.baseline] : []),
                r.search_origin,
                r.destination,
                r.depart_date,
                r.return_date
            );

            // Origin label
            var labelHtml = '<div class="origin-label">';
            labelHtml += '<span class="airport">' + r.search_origin + '</span>';

            // Cache / API stats line
            var statsLine = r.hubs_searched.length + ' hubs searched';
            if (fromCache) {
                statsLine += ' | <span style="color:#4ade80;">Cached results</span>';
                var cachedAt = r._cached_at || '';
                if (cachedAt) {
                    statsLine += '<span style="display:block; font-size:11px; color:#94a3b8; margin-top:2px;">' +
                        'Last searched: ' + formatTimestamp(cachedAt) + ' (' + formatRelativeTime(cachedAt) + ')' +
                        '</span>';
                }
            } else if (r.cache_stats) {
                statsLine += ' | ' + r.cache_stats.search_misses + ' new API calls';
                if (r.cache_stats.search_hits > 0) {
                    statsLine += ', ' + r.cache_stats.search_hits + ' cached';
                }
            } else {
                statsLine += ' | ' + (r.api_calls_used || "?") + ' SerpAPI calls used';
            }
            labelHtml += '<span style="display:block; font-size:12px; color:#64748b; margin-top:4px;">' + statsLine + '</span>';

            if (r.is_hub_search && r.ground_cost > 0) {
                labelHtml += '<span class="ground-note">Includes $' + r.ground_cost.toFixed(2) + ' ground transit (driving + parking) in all totals</span>';
            }
            labelHtml += '</div>';
            if (fromCache) {
                labelHtml += '<div style="text-align:center; margin-top:10px;">' +
                    '<button class="btn-rerun" onclick="rerunSearch(\'' +
                    r.search_origin + '\',\'' + r.destination + '\',\'' + r.depart_date + '\',\'' + r.return_date +
                    '\')">' +
                    'Rerun Search from ' + r.search_origin +
                    '</button></div>';
            }
            document.getElementById("originLabel").innerHTML = labelHtml;

            // Price insights
            var piHtml = "";
            if (r.price_insights && r.price_insights.price_level) {
                var pi = r.price_insights;
                var piClass = "price-typical";
                var piLabel = "Prices are typical";
                if (pi.price_level === "low") { piClass = "price-low"; piLabel = "Prices are currently low"; }
                else if (pi.price_level === "high") { piClass = "price-high"; piLabel = "Prices are currently high"; }
                var rangeStr = "";
                if (pi.typical_price_range && pi.typical_price_range.length === 2) {
                    rangeStr = " | Typical range: $" + pi.typical_price_range[0] + " - $" + pi.typical_price_range[1];
                }
                piHtml = '<div class="price-insights ' + piClass + '">' + piLabel + rangeStr + '</div>';
            }
            document.getElementById("priceInsights").innerHTML = piHtml;

            // Baseline card
            var baseHtml = "";
            if (r.baseline) {
                var b = r.baseline;
                var bStops = stopsLabel(b.stops, b.connections);
                var displayPrice = b.price;
                var breakdownHtml = "";
                if (r.is_hub_search && b.total_with_ground) {
                    displayPrice = b.total_with_ground;
                    breakdownHtml = '<div class="price-breakdown">Flight: $' + b.price.toFixed(2) + ' + Ground: $' + b.ground_cost.toFixed(2) + '</div>';
                }
                var baseGfUrl = googleFlightsUrl(r.search_origin, r.destination, r.depart_date, r.return_date);
                var logoHtml = airlineLogoHtml(b.airline_logos, b.airlines);
                var layoverHtml = formatLayoverDetails(b.layover_details);

                baseHtml =
                    '<div class="baseline-card">' +
                        '<div>' +
                            '<div class="label">Baseline: Standard Round-Trip</div>' +
                            '<div class="route">' + r.search_origin + ' &#8594; ' + r.destination + ' (single ticket)</div>' +
                            layoverHtml +
                            '<div style="margin-top:8px;">' +
                                '<a class="gf-link gf-link-baseline" href="' + baseGfUrl + '" target="_blank" rel="noopener">View on Google Flights</a>' +
                            '</div>' +
                        '</div>' +
                        '<div>' +
                            '<div class="price">$' + displayPrice.toFixed(2) + '</div>' +
                            breakdownHtml +
                            '<div class="detail">' + logoHtml + b.carrier_display + ' | ' + bStops + ' | ' + formatMinutes(b.total_duration) + '</div>' +
                        '</div>' +
                    '</div>';
            } else {
                baseHtml =
                    '<div class="baseline-card">' +
                        '<div>' +
                            '<div class="label">Baseline: No Direct Flights Found</div>' +
                            '<div class="route">' + r.search_origin + ' &#8594; ' + r.destination + '</div>' +
                        '</div>' +
                        '<div><div class="price">N/A</div></div>' +
                    '</div>';
            }
            document.getElementById("baselineCard").innerHTML = baseHtml;

            // Hacker fare table
            var tableHtml = "";
            if (r.hacker_fares && r.hacker_fares.length > 0) {
                var totalLabel = r.is_hub_search ? "Total (incl. ground)" : "Total";
                tableHtml =
                    '<div class="hf-table-wrap">' +
                        '<div class="hf-table-header"><h3>Hacker Fare Routes - ranked by total price (live Google Flights prices)</h3></div>' +
                        '<table class="hf-table">' +
                            '<thead>' +
                            '<tr>' +
                                '<th>#</th>' +
                                '<th>Hub</th>' +
                                '<th>Positioning RT</th>' +
                                '<th>International RT</th>' +
                                '<th class="right">' + totalLabel + '</th>' +
                                '<th class="right">vs Baseline</th>' +
                            '</tr>' +
                            '</thead>' +
                            '<tbody>';

                for (var i = 0; i < r.hacker_fares.length; i++) {
                    var hf = r.hacker_fares[i];
                    var pos = hf.positioning;
                    var intl = hf.international;
                    var rowClass = (i === 0) ? ' class="best-row"' : '';
                    var rankClass = "rank-other";
                    if (hf.rank === 1) rankClass = "rank-1";
                    else if (hf.rank === 2) rankClass = "rank-2";
                    else if (hf.rank === 3) rankClass = "rank-3";

                    var savingsHtml = "";
                    if (hf.savings_vs_baseline !== null && hf.savings_vs_baseline !== undefined) {
                        if (hf.savings_vs_baseline > 0) {
                            savingsHtml = '<div class="savings-badge savings-positive">Save $' + hf.savings_vs_baseline.toFixed(2) + '</div>';
                        } else if (hf.savings_vs_baseline < 0) {
                            savingsHtml = '<div class="savings-badge savings-negative">+$' + Math.abs(hf.savings_vs_baseline).toFixed(2) + ' more</div>';
                        } else {
                            savingsHtml = '<div class="savings-badge savings-neutral">Same price</div>';
                        }
                    } else {
                        savingsHtml = '<span style="color:#64748b">N/A</span>';
                    }

                    var posStops = stopsLabel(pos.stops, pos.connections);
                    var intlStops = stopsLabel(intl.stops, intl.connections);

                    var displayTotal = hf.total_with_ground;
                    var groundNote = "";
                    if (r.is_hub_search && hf.ground_cost > 0) {
                        groundNote = '<div class="total-ground">Flights: $' + hf.total.toFixed(2) + ' + Ground: $' + hf.ground_cost.toFixed(2) + '</div>';
                    }

                    var posGfUrl = googleFlightsUrl(r.search_origin, hf.hub, r.depart_date);
                    var intlGfUrl = googleFlightsUrl(hf.hub, r.destination, r.depart_date);

                    var posLogoHtml = airlineLogoHtml(pos.airline_logos, pos.airlines);
                    var intlLogoHtml = airlineLogoHtml(intl.airline_logos, intl.airlines);

                    tableHtml +=
                        '<tr' + rowClass + '>' +
                            '<td><span class="rank-badge ' + rankClass + '">' + hf.rank + '</span></td>' +
                            '<td><span class="hub-name">' + hf.hub + '</span></td>' +
                            // Positioning round-trip
                            '<td>' +
                                '<div class="leg-price">' + posLogoHtml + '$' + pos.price.toFixed(2) + ' RT</div>' +
                                '<div class="leg-detail">' + pos.carrier_display + ' | ' + posStops + '</div>' +
                                '<div class="leg-detail">' + r.search_origin + ' <-> ' + hf.hub + '</div>' +
                                formatLayoverDetails(pos.layover_details) +
                                '<a class="gf-link" href="' + posGfUrl + '" target="_blank" rel="noopener">Google Flights</a>' +
                            '</td>' +
                            // International round-trip
                            '<td>' +
                                '<div class="leg-price">' + intlLogoHtml + '$' + intl.price.toFixed(2) + ' RT</div>' +
                                '<div class="leg-detail">' + intl.carrier_display + ' | ' + intlStops + '</div>' +
                                '<div class="leg-detail">' + hf.hub + ' <-> ' + r.destination + '</div>' +
                                formatLayoverDetails(intl.layover_details) +
                                '<a class="gf-link" href="' + intlGfUrl + '" target="_blank" rel="noopener">Google Flights</a>' +
                            '</td>' +
                            // Total
                            '<td class="right">' +
                                '<div class="total-price">$' + displayTotal.toFixed(2) + '</div>' +
                                '<div class="leg-detail">Pos: $' + hf.positioning_price.toFixed(2) + ' | Intl: $' + hf.international_price.toFixed(2) + '</div>' +
                                groundNote +
                            '</td>' +
                            // Savings
                            '<td class="right">' + savingsHtml + '</td>' +
                        '</tr>';
                }

                tableHtml += '</tbody></table></div>';
            } else {
                tableHtml =
                    '<div class="hf-table-wrap">' +
                        '<div class="no-results">No valid hacker fare routes found. The hubs may not have compatible flight times for the minimum connection window.</div>' +
                    '</div>';
            }
            document.getElementById("hackerFareTable").innerHTML = tableHtml;

            // Warnings
            var warnHtml = "";
            if (r.global_warnings && r.global_warnings.length > 0) {
                for (var w = 0; w < r.global_warnings.length; w++) {
                    warnHtml += '<div class="warning-card">! ' + r.global_warnings[w] + '</div>';
                }
            }
            document.getElementById("warnings").innerHTML = warnHtml;
        }

        // Page load: hydrate from localStorage and render most recent cached results
        (function() {
            // Set initial selectedIata for pre-filled airport inputs
            document.getElementById('inputOrigin').dataset.selectedIata = '{{ origin }}';
            document.getElementById('inputDestination').dataset.selectedIata = '';
            /* hub airport hardcoded to ORD — no input element */

            loadFromLocalStorage();
            renderRecentSearches();
            fetchCommunityDeals();

            var mostRecent = null;
            var mostRecentTime = null;
            for (var key in resultsCache) {
                var t = resultsCache[key]._cached_at;
                if (t && (!mostRecentTime || t > mostRecentTime)) {
                    mostRecentTime = t;
                    mostRecent = key;
                }
            }
            if (mostRecent) {
                renderResults(resultsCache[mostRecent], true);
            }
        })();
    </script>
</body>
</html>
